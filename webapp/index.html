<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comtra Webapp (Read-Only MVP)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Comtra Webapp MVP</h1>
        <p>Read-only account dashboard (credits, trophies, history)</p>
      </header>

      <section class="card">
        <label for="backendUrl">Auth backend URL</label>
        <input
          id="backendUrl"
          type="text"
          autocomplete="url"
          placeholder="https://auth.comtra.dev"
          value=""
        />

        <div id="sessionRow" class="session-row hidden">
          <p id="sessionLabel" class="session-label"></p>
          <button id="logoutBtn" type="button" class="secondary">Log out</button>
        </div>

        <div class="row row-wrap">
          <button id="loginFigmaBtn" type="button" class="primary">Log in with Figma</button>
          <button id="loadBtn" type="button">Load data</button>
          <button id="clearBtn" type="button" class="secondary">Clear session</button>
        </div>

        <details class="advanced">
          <summary>Manual JWT (debug)</summary>
          <label for="token">JWT token</label>
          <textarea
            id="token"
            rows="3"
            placeholder="Optional: paste token if you cannot use browser login"
          ></textarea>
        </details>

        <p id="status" class="status"></p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Credits</h2>
          <pre id="creditsOut">-</pre>
        </article>
        <article class="card">
          <h2>Trophies</h2>
          <pre id="trophiesOut">-</pre>
        </article>
      </section>

      <section class="card">
        <h2>History</h2>
        <pre id="historyOut">-</pre>
      </section>
    </main>

    <script src="./config.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
